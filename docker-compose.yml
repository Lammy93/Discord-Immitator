services:
  discord-bot:
    # Replace <your-github-username> with your actual GitHub username
    image: ghcr.io/lammy93/discord-immitator:latest
    container_name: discord_imitator_bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist downloaded sound bites
      - ./sounds:/app/sounds
      # Persist SQLite database
      - ./data:/app/data
    environment:
      # The token is provided via Portainer Environment Variables
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      # Tell the bot where to save the sqlite database inside the persistent volume
      - DATABASE_PATH=/app/data/bot.db

