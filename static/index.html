<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,, initial-scale=1.0">
    <title>Discord Imitator Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: #0f172a; color: #f8fafc; }
        .tab-active { border-bottom: 3px solid #8b5cf6; color: #8b5cf6; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-bold text-white flex items-center gap-3">
                    <i class="fa-solid fa-mask text-violet-500"></i> Imitator Dashboard
                </h1>
                <div class="flex items-center gap-3 mt-2">
                    <label class="text-sm text-slate-400">Select Server:</label>
                    <select id="guild-select" onchange="changeGuild(this.value)" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1 text-sm text-white outline-none focus:border-violet-500 transition-all">
                        <option value="">Loading servers...</option>
                    </select>
                    <div id="imitation-status" class="flex items-center gap-2 text-sm font-medium text-violet-400 ml-2">
                        <!-- Status updated via JS -->
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <a href="https://discord.com/developers/applications" target="_blank" class="glass px-4 py-2 rounded-lg text-sm text-slate-300 hover:text-white transition-all flex items-center gap-2">
                    <i class="fa-solid fa-gear"></i> Developer Portal
                </a>
                <div id="voice-status" class="glass px-4 py-2 rounded-full text-sm flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-slate-500" id="status-indicator"></span>
                    <span id="status-text">Disconnected</span>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="flex gap-8 mb-8 border-b border-slate-700">
            <button onclick="showTab('members')" id="tab-members" class="pb-2 px-1 font-medium tab-active transition-colors">Members</button>
            <button onclick="showTab('sounds')" id="tab-sounds" class="pb-2 px-1 font-medium text-slate-400 hover:text-white transition-colors">Soundboard</button>
            <button onclick="showTab('voice')" id="tab-voice" class="pb-2 px-1 font-medium text-slate-400 hover:text-white transition-colors">Voice Channels</button>
            <button onclick="showTab('settings')" id="tab-settings" class="pb-2 px-1 font-medium text-slate-400 hover:text-white transition-colors">Settings</button>
        </nav>

        <!-- Member Tab -->
        <div id="view-members" class="tab-view space-y-6">
            <!-- Global Quick Send (Hidden by default) -->
            <div id="global-send-box" class="hidden glass p-6 rounded-2xl border-violet-500/50 bg-violet-500/10 transition-all animate-in fade-in slide-in-from-top-4 duration-300">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-white flex items-center gap-2">
                        <i class="fa-solid fa-paper-plane text-violet-400"></i> Quick Mirror: <span id="active-mirror-name" class="text-violet-400">None</span>
                    </h3>
                    <button onclick="clearMirror()" class="text-slate-400 hover:text-white text-sm transition-colors">
                        <i class="fa-solid fa-times"></i> Close
                    </button>
                </div>
                <div class="flex flex-col gap-4">
                    <div class="flex items-center gap-3">
                        <label class="text-sm text-slate-400 whitespace-nowrap">Target Channel:</label>
                        <select id="target-channel" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-1 text-sm text-white outline-none focus:border-violet-500 transition-all">
                            <!-- Channels loaded here -->
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="global-msg" placeholder="Type your message here..." class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white outline-none focus:border-violet-500 transition-all">
                        <button onclick="sendQuick()" class="bg-violet-600 hover:bg-violet-700 text-white px-6 py-2 rounded-lg font-bold transition-all flex items-center gap-2">
                            Send <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="text-xs text-slate-500 uppercase font-bold">Mention User:</label>
                        <select id="mention-select" onchange="mentionUser(this.value)" class="bg-slate-900 border border-slate-800 rounded-lg px-2 py-1 text-xs text-slate-300 outline-none focus:border-violet-500 transition-all">
                            <option value="">Select member to @</option>
                            <!-- Members loaded here -->
                        </select>
                    </div>
                </div>
            </div>

            <div id="members-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Members loaded here -->
            </div>
        </div>

        <!-- Sounds Tab -->
        <div id="view-sounds" class="tab-view hidden">
            <div class="glass p-6 rounded-2xl mb-8">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-upload"></i> Upload New Sound
                </h2>
                <form id="upload-form" class="flex flex-wrap gap-4 items-end">
                    <div class="flex-1 min-w-[200px]">
                        <label class="block text-sm text-slate-400 mb-1">Sound Name <span class="text-xs text-slate-500">(optional with multiple files)</span></label>
                        <input type="text" id="sound-name" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white outline-none focus:border-violet-500 transition-all">
                    </div>
                    <div class="flex-1 min-w-[200px]">
                        <label class="block text-sm text-slate-400 mb-1">Audio File</label>
                        <input type="file" id="sound-file" required accept="audio/*" multiple class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-violet-600 file:text-white hover:file:bg-violet-700 cursor-pointer">
                    </div>
                    <button type="submit" class="bg-violet-600 hover:bg-violet-700 text-white font-bold py-2 px-6 rounded-lg transition-all flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Add Sound
                    </button>
                </form>
            </div>
            <div id="sounds-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Sounds loaded here -->
            </div>
        </div>

        <!-- Voice Tab -->
        <div id="view-voice" class="tab-view hidden">
            <div class="glass p-6 rounded-2xl mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-volume-high"></i> Available Voice Channels
                    </h2>
                    <div class="flex items-center gap-3">
                        <button onclick="disconnectVoice()" class="bg-slate-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2">
                            <i class="fa-solid fa-phone-slash"></i> Disconnect
                        </button>
                    </div>
                </div>
                <div id="channels-list" class="space-y-3">
                    <!-- Channels loaded here -->
                </div>
            </div>

        </div>

        <!-- Settings Tab -->
        <div id="view-settings" class="tab-view hidden">
            <div class="glass p-6 rounded-2xl max-w-2xl mx-auto">
                <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-user-gear"></i> Bot Presence Settings
                </h2>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Status</label>
                        <select id="status-select" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white outline-none focus:border-violet-500 transition-all">
                            <option value="online">Online 🟢</option>
                            <option value="idle">Idle 🌙</option>
                            <option value="dnd">Do Not Disturb 🔴</option>
                            <option value="invisible">Invisible ⚪</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Activity Type</label>
                        <select id="activity-type" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white outline-none focus:border-violet-500 transition-all">
                            <option value="playing">Playing</option>
                            <option value="watching">Watching</option>
                            <option value="listening">Listening to</option>
                            <option value="competing">Competing in</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Activity Text</label>
                        <input type="text" id="activity-name" placeholder="e.g. a game of Chess" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white outline-none focus:border-violet-500 transition-all">
                    </div>
                    <button onclick="updatePresence()" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-lg transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-save"></i> Save Presence
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedGuildId = null;
        let selectedMemberId = null;
        let selectedMemberName = '';

        async function api(endpoint, options = {}) {
            const response = await fetch(`/api${endpoint}`, options);
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.detail || 'API Error');
            }
            return response.json();
        }

        async function updateStatus() {
            try {
                const data = await api('/status');
                const guildSelect = document.getElementById('guild-select');
                const currentVal = guildSelect.value;
                
                guildSelect.innerHTML = '<option value="">-- Select Server --</option>';
                data.guilds.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.text = g.name;
                    if (g.id === currentVal) opt.selected = true;
                    guildSelect.appendChild(opt);
                });

                if (selectedGuildId) {
                    const guild = data.guilds.find(g => g.id === selectedGuildId);
                    if (guild) {
                        const indicator = document.getElementById('status-indicator');
                        const text = document.getElementById('status-text');
                        const imitStatus = document.getElementById('imitation-status');
                        
                        if (guild.is_connected) {
                            indicator.className = 'w-2 h-2 rounded-full bg-green-500';
                            text.innerText = `In Voice: ${guild.voice_channel}`;
                        } else {
                            indicator.className = 'w-2 h-2 rounded-full bg-slate-500';
                            text.innerText = 'Disconnected';
                        }

                        if (guild.imitating) {
                            const avatar = guild.imitating_avatar_url || 'https://cdn.discordapp.com/embed/avatars/0.png';
                            imitStatus.innerHTML = `
                                <img src="${avatar}" class="w-5 h-5 rounded-full border border-violet-400">
                                <span>Imitating: ${guild.imitating}</span>
                            `;
                        } else {
                            imitStatus.innerText = '';
                        }
                    }
                }
            } catch (e) {
                console.error('Status update failed:', e);
            }
        }

        async function changeGuild(guildId) {
            selectedGuildId = guildId;
            selectedMemberId = null;
            selectedMemberName = '';
            document.getElementById('global-send-box').classList.add('hidden');
            if (!guildId) {
                document.getElementById('members-grid').innerHTML = '';
                document.getElementById('channels-list').innerHTML = '';
                return;
            }
            loadMembers();
            loadChannels();
        }

        async function loadMembers() {
            if (!selectedGuildId) return;
            try {
                const members = await api(`/members?guild_id=${selectedGuildId}`);
                const channels = await api(`/text-channels?guild_id=${selectedGuildId}`);
                const grid = document.getElementById('members-grid');
                grid.innerHTML = '';
                
                // Update global channel selector
                const channelSelect = document.getElementById('target-channel');
                channelSelect.innerHTML = channels.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                
                const mentionSelect = document.getElementById('mention-select');
                mentionSelect.innerHTML = '<option value="">Select member to @</option>';
                members.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.text = m.name;
                    mentionSelect.appendChild(opt);
                });
                
                let membersHtml = '';
                members.forEach(m => {
                    membersHtml += `
                        <div class="glass p-4 rounded-2xl flex flex-col gap-4 hover:bg-white/10 transition-all">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <img src="${m.avatar}" class="w-12 h-12 rounded-full border-2 border-slate-700">
                                    <div>
                                        <div class="font-bold text-white">${m.name}</div>
                                        <div class="text-xs text-slate-400">${m.id}</div>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <a href="${m.avatar}" target="_blank" download="avatar_${m.id}.png" class="p-2 text-slate-400 hover:text-white transition-colors" title="View/Download Avatar">
                                        <i class="fa-solid fa-download"></i>
                                    </a>
                                    <button onclick="selectForMirror('${m.id}', '${m.name}')" class="bg-violet-600 hover:bg-violet-700 text-white px-3 py-1 rounded-lg text-sm font-medium transition-colors">
                                        Mirror
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                grid.innerHTML = membersHtml;
            } catch (e) {
                document.getElementById('members-grid').innerHTML = `<div class="col-span-full text-center text-slate-400">Error loading members: ${e.message}</div>`;
            }
        }

        async function selectForMirror(memberId, memberName) {
            selectedMemberId = memberId;
            selectedMemberName = memberName;
            
            try {
                await api('/imitate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({guild_id: selectedGuildId, member_id: memberId})
                });
            } catch (e) {
                console.error("Failed to start imitation:", e);
            }
            
            const box = document.getElementById('global-send-box');
            const nameDisplay = document.getElementById('active-mirror-name');
            
            box.classList.remove('hidden');
            nameDisplay.innerText = memberName;
            document.getElementById('global-msg').focus();
            updateStatus();
        }

        function clearMirror() {
            if (selectedGuildId) {
                api(`/imitate/reset?guild_id=${selectedGuildId}`, { method: 'POST' })
                .catch(e => console.error("Failed to reset identity:", e));
            }
            selectedMemberId = null;
            selectedMemberName = '';
            document.getElementById('global-send-box').classList.add('hidden');
            updateStatus();
        }

        async function sendQuick() {
            if (!selectedGuildId) return alert('Please select a server first!');
            if (!selectedMemberId) return alert('Please select a member to mirror first!');
            
            const channelId = document.getElementById('target-channel')?.value;
            if (!channelId) return alert('Please select a target channel first!');
            
            const msg = document.getElementById('global-msg').value;
            if (!msg) return alert('Please enter a message!');
            
            try {
                await api('/imitate-send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        guild_id: selectedGuildId, 
                        member_id: selectedMemberId, 
                        channel_id: channelId, 
                        message: msg
                    })
                });
                alert(`Message sent as ${selectedMemberName}!`);
                document.getElementById('global-msg').value = '';
            } catch (e) {
                alert(e.message);
            }
        }

        function mentionUser(memberId) {
            if (!memberId) return;
            const input = document.getElementById('global-msg');
            input.value += `<@${memberId}> `;
            input.focus();
        }

        async function loadSounds() {
            try {
                const sounds = await api('/sounds');
                const container = document.getElementById('sounds-list');
                container.innerHTML = '';
                sounds.forEach(s => {
                    container.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex items-center justify-between group hover:bg-white/10 transition-all">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-lg bg-violet-500/20 flex items-center justify-center text-violet-400">
                                    <i class="fa-solid fa-music"></i>
                                </div>
                                <div>
                                    <div class="font-bold text-white">${s.name}</div>
                                    <div class="text-xs text-slate-400">Plays: ${s.play_count} | Added by: ${s.added_by}</div>
                                </div>
                            </div>
                            <button onclick="playSound('${s.name}')" class="bg-slate-700 hover:bg-violet-600 text-white w-10 h-10 rounded-full flex items-center justify-center transition-all">
                                <i class="fa-solid fa-play"></i>
                            </button>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('sounds-list').innerHTML = `<div class="col-span-full text-center text-slate-400">Error loading sounds: ${e.message}</div>`;
            }
        }

        async function playSound(name) {
            if (!selectedGuildId) return alert('Please select a server first!');
            try {
                await api('/sound/play', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({guild_id: selectedGuildId, sound_name: name})
                });
            } catch (e) {
                alert(e.message);
            }
        }

        async function loadChannels() {
            if (!selectedGuildId) return;
            try {
                const channels = await api(`/channels?guild_id=${selectedGuildId}`);
                const container = document.getElementById('channels-list');
                container.innerHTML = '';
                channels.forEach(c => {
                    container.innerHTML += `
                        <div class="flex items-center justify-between p-3 bg-slate-800/50 rounded-xl border border-slate-700 hover:border-violet-500 transition-all">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-volume-high text-slate-400"></i>
                                <span class="font-medium text-slate-200">${c.name}</span>
                            </div>
                            <button onclick="joinVoice('${c.id}')" class="bg-violet-600 hover:bg-violet-700 text-white px-4 py-1 rounded-lg text-sm font-medium transition-colors">
                                Join
                            </button>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('channels-list').innerHTML = `<div class="text-center text-slate-400">Error loading channels: ${e.message}</div>`;
            }
        }

        async function joinVoice(channelId) {
            if (!selectedGuildId) return alert('Please select a server first!');
            try {
                await api('/voice/join', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({guild_id: selectedGuildId, channel_id: channelId})
                });
                updateStatus();
            } catch (e) {
                alert(e.message);
            }
        }

        async function disconnectVoice() {
            if (!selectedGuildId) return alert('Please select a server first!');
            try {
                await api('/voice/disconnect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({guild_id: selectedGuildId})
                });
                updateStatus();
            } catch (e) {
                alert(e.message);
            }
        }

        async function updatePresence() {
            const status = document.getElementById('status-select').value;
            const activityType = document.getElementById('activity-type').value;
            const activityName = document.getElementById('activity-name').value;
            try {
                await api('/status/update', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({status, activity_type: activityType, activity_name: activityName})
                });
                alert('Presence updated!');
            } catch (e) {
                alert(e.message);
            }
        }

        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            const files = document.getElementById('sound-file').files;
            const nameInput = document.getElementById('sound-name').value;

            if (files.length === 0) return;

            let successCount = 0;
            let failCount = 0;

            if (files.length === 1 && nameInput) {
                const formData = new FormData();
                formData.append('name', nameInput);
                formData.append('file', files[0]);
                try {
                    await api('/sound/upload', { method: 'POST', body: formData });
                    successCount++;
                } catch (err) { failCount++; }
            } else {
                const formData = new FormData();
                for (const file of files) {
                    formData.append('files', file);
                }
                try {
                    const result = await api('/sound/upload-multiple', { method: 'POST', body: formData });
                    successCount = result.results.success.length;
                    failCount = result.results.failed.length;
                } catch (err) { failCount = files.length; }
            }

            alert(`Uploaded ${successCount} sound(s)${failCount ? `, ${failCount} failed` : ''}`);
            document.getElementById('upload-form').reset();
            loadSounds();
        };

        function showTab(tab) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('text-slate-400');
            });
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            document.getElementById(`tab-${tab}`).classList.remove('text-slate-400');
            
            if (tab === 'members') loadMembers();
            if (tab === 'sounds') loadSounds();
            if (tab === 'voice') loadChannels();
        }

        setInterval(updateStatus, 5000);
        updateStatus();
        showTab('members');
    </script>
</body>
</html>
